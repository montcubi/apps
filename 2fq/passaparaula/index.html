<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Passaparaula FQ 2n ESO</title>

  <style>
    :root {
      --blau: #2563eb;
      --verd: #16a34a;
      --vermell: #dc2626;
      --gris: #64748b;
      --fons: #f8fafc;
      --text: #0f172a;
      --groc: #facc15;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--fons);
      color: var(--text);
    }

    header {
      background: linear-gradient(135deg, #1d4ed8, #0891b2);
      color: white;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 2rem;
    }

    header p {
      margin: 6px 0 0;
      font-size: 1rem;
    }

    main {
      max-width: 1200px;
      margin: auto;
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr 1.2fr 1fr;
      gap: 20px;
    }

    .panel {
      background: white;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
    }

    .controls {
      grid-column: 1 / -1;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      align-items: center;
    }

    select,
    button,
    input {
      font-size: 1rem;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      padding: 10px 14px;
    }

    button {
      cursor: pointer;
      border: none;
      font-weight: bold;
      background: var(--blau);
      color: white;
      transition: 0.2s;
    }

    button:hover {
      filter: brightness(0.95);
      transform: translateY(-1px);
    }

    .btn-green {
      background: var(--verd);
    }

    .btn-red {
      background: var(--vermell);
    }

    .btn-gray {
      background: var(--gris);
    }

    .btn-yellow {
      background: #ca8a04;
    }

    .team-card {
      border: 4px solid transparent;
    }

    .active-team {
      border-color: var(--groc);
      box-shadow: 0 0 0 5px rgba(250, 204, 21, 0.35);
    }

    .team-card h2 {
      text-align: center;
      margin-top: 0;
    }

    .score {
      font-size: 2.4rem;
      text-align: center;
      font-weight: bold;
      color: var(--blau);
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .stat {
      background: #f1f5f9;
      padding: 10px;
      border-radius: 12px;
      text-align: center;
      font-weight: bold;
    }

    .game {
      text-align: center;
    }

    .letter-big {
      font-size: 5rem;
      font-weight: bold;
      color: var(--blau);
      margin: 10px 0;
    }

    .hint {
      background: #eff6ff;
      border-left: 6px solid var(--blau);
      padding: 18px;
      border-radius: 12px;
      font-size: 1.3rem;
      min-height: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.4;
    }

    .answer-box {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .answer-box input {
      width: min(420px, 100%);
      font-size: 1.2rem;
    }

    .buttons {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .rosco {
      position: relative;
      width: 430px;
      height: 430px;
      max-width: 100%;
      margin: 20px auto 0;
    }

    .letter {
      position: absolute;
      width: 38px;
      height: 38px;
      margin: -19px;
      border-radius: 50%;
      background: #cbd5e1;
      color: white;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 3px solid white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .pending {
      background: var(--blau);
    }

    .correct {
      background: var(--verd);
    }

    .wrong {
      background: var(--vermell);
    }

    .current {
      outline: 5px solid var(--groc);
    }

    .message {
      grid-column: 1 / -1;
      text-align: center;
      font-size: 1.2rem;
      font-weight: bold;
      background: #fff7ed;
      border: 2px solid #fed7aa;
      padding: 14px;
      border-radius: 14px;
      min-height: 54px;
    }

    @media (max-width: 950px) {
      main {
        grid-template-columns: 1fr;
      }

      .rosco {
        width: 330px;
        height: 330px;
      }

      .letter {
        width: 32px;
        height: 32px;
        margin: -16px;
        font-size: 0.85rem;
      }
    }
  </style>
</head>

        <option value="semifinal2">Semifinal 2</option>
        <option value="final">Final</option>
      </select>

      <button onclick="startGame()">Començar ronda</button>
      <button class="btn-gray" onclick="resetGame()">Reiniciar</button>
    </section>

    <section id="teamA" class="panel team-card">
      <h2>Equip A</h2>
      <div class="score" id="scoreA">0</div>

      <div class="stats">
        <div class="stat">Encerts<br><span id="correctA">0</span></div>
        <div class="stat">Errors<br><span id="wrongA">0</span></div>
        <div class="stat">Pendents<br><span id="pendingA">26</span></div>
        <div class="stat">Torn<br><span id="turnA">—</span></div>
      </div>

      <div class="rosco" id="roscoA"></div>
    </section>

    <section class="panel game">
      <h2 id="roundTitle">Tria una ronda i comença</h2>

      <div class="letter-big" id="currentLetter">?</div>

      <div class="hint" id="hint">
        Prem “Començar ronda”.
      </div>

      <div class="answer-box">
        <input id="answerInput" type="text" placeholder="Escriu la resposta..." autocomplete="off" />
      </div>

      <div class="buttons">
        <button class="btn-green" onclick="checkAnswer()">Comprovar</button>
        <button class="btn-yellow" onclick="passWord()">Passaparaula</button>
        <button class="btn-green" onclick="manualCorrect()">Correcta</button>
        <button class="btn-red" onclick="manualWrong()">Incorrecta</button>
      </div>
    </section>

    <section id="teamB" class="panel team-card">

        <div class="stat">Torn<br><span id="turnB">—</span></div>
      </div>

      <div class="rosco" id="roscoB"></div>
    </section>

    <section class="message" id="message">
      Joc preparat.
    </section>
  </main>

          ["V", "comença", "Espai ocupat per un cos.", "volum", []],
          ["W", "conté", "Unitat de força.", "newton", []],
          ["X", "conté", "Gas present a l’aire necessari per respirar.", "oxigen", []],
          ["Y", "conté", "Conté el dígraf NY. Preparació d’un experiment o d’una solució.", "disseny", []],
          ["Z", "comença", "Valor que indica absència de quantitat.", "zero", []]
        ]
      }
    };

    let estat = {
      ronda: "semifinal1",
      torn: "A",
      equips: {
        A: {
          preguntes: [],
          index: 0,
          encerts: 0,
          errors: 0
        },
        B: {
          preguntes: [],
          index: 0,
          encerts: 0,
          errors: 0
        }
      },
      comencat: false
    };

    function normalitza(text) {
      return String(text)
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[·'’.,;:!?¿¡()]/g, "")
        .trim();
    }

    function creaPreguntes(llista) {
      return llista.map(item => ({
        lletra: item[0],
        tipus: item[1],
        pista: item[2],
        resposta: item[3],
        alternatives: item[4] || [],
        estat: "pending"
      }));
    }

    function startGame() {
      const ronda = document.getElementById("roundSelect").value;

      estat.ronda = ronda;
      estat.torn = "A";
      estat.comencat = true;

      estat.equips.A = {
        preguntes: creaPreguntes(dades[ronda].A),
        index: 0,
        encerts: 0,
        errors: 0
      };

      estat.equips.B = {
        preguntes: creaPreguntes(dades[ronda].B),
        index: 0,
        encerts: 0,
        errors: 0
      };

      document.getElementById("roundTitle").textContent = dades[ronda].nom;
      document.getElementById("message").textContent = "Comença l’Equip A.";
      document.getElementById("answerInput").value = "";

      render();
      mostraPregunta();
    }

    function resetGame() {
      startGame();
    }

    function actual() {
      return estat.equips[estat.torn];
    }

    function preguntaActual() {
      const equip = actual();
      return equip.preguntes[equip.index];
    }

    function mouIndexAlSeguentPendent(equip) {
      const pendents = equip.preguntes.filter(p => p.estat === "pending");

      if (pendents.length === 0) return;

      let intents = 0;

      do {
        equip.index = (equip.index + 1) % equip.preguntes.length;
        intents++;
      } while (
        equip.preguntes[equip.index].estat !== "pending" &&
        intents < equip.preguntes.length + 1
      );
    }

    function seguentPreguntaMateixEquip() {
      const equip = actual();
      const pendents = equip.preguntes.filter(p => p.estat === "pending");

      if (pendents.length === 0) {
        canviaTorn();
        return;
      }

      mouIndexAlSeguentPendent(equip);
      mostraPregunta();
    }

    function canviaTorn() {
      estat.torn = estat.torn === "A" ? "B" : "A";

      if (partidaAcabada()) {
        fiPartida();
        return;
      }

      let equip = actual();
      let pendents = equip.preguntes.filter(p => p.estat === "pending");

      if (pendents.length === 0) {
        estat.torn = estat.torn === "A" ? "B" : "A";

        if (partidaAcabada()) {
          fiPartida();
          return;
        }
      }

      equip = actual();

      if (equip.preguntes[equip.index].estat !== "pending") {
        mouIndexAlSeguentPendent(equip);
      }

      document.getElementById("message").textContent = "Torn de l’Equip " + estat.torn + ".";
      mostraPregunta();
    }

    function checkAnswer() {
      if (!estat.comencat) return;

      const p = preguntaActual();
      const respostaUsuari = normalitza(document.getElementById("answerInput").value);
      const correctes = [p.resposta, ...p.alternatives].map(normalitza);

      if (correctes.includes(respostaUsuari)) {
        p.estat = "correct";
        actual().encerts++;

        document.getElementById("message").textContent =
          "Correcte! Continua l’Equip " + estat.torn + ".";

        document.getElementById("answerInput").value = "";

        render();
        seguentPreguntaMateixEquip();
      } else {
        p.estat = "wrong";
        actual().errors++;

        document.getElementById("message").textContent =
          "Incorrecte. Canvi de torn.";

        document.getElementById("answerInput").value = "";

        render();
        canviaTorn();
      }
    }

    function passWord() {
      if (!estat.comencat) return;

      const equip = actual();

      mouIndexAlSeguentPendent(equip);

      document.getElementById("message").textContent = "Passaparaula. Canvi de torn.";
      document.getElementById("answerInput").value = "";

      render();
      canviaTorn();
    }

    function manualCorrect() {
      if (!estat.comencat) return;

      const p = preguntaActual();

      p.estat = "correct";
      actual().encerts++;

      document.getElementById("answerInput").value = "";
      document.getElementById("message").textContent =
        "Marcada com a correcta. Continua l’Equip " + estat.torn + ".";

      render();
      seguentPreguntaMateixEquip();
    }

    function manualWrong() {
      if (!estat.comencat) return;

      const p = preguntaActual();

      p.estat = "wrong";
      actual().errors++;

      document.getElementById("answerInput").value = "";
      document.getElementById("message").textContent =
        "Incorrecte. Canvi de torn.";

      render();
      canviaTorn();
    }

    function mostraPregunta() {
      if (partidaAcabada()) {
        fiPartida();
        return;
      }

      const p = preguntaActual();

      document.getElementById("currentLetter").textContent = p.lletra;

      document.getElementById("hint").innerHTML =
        "<strong>" + p.tipus.toUpperCase() + " per " + p.lletra + ":</strong><br>" + p.pista;

      document.getElementById("answerInput").focus();

      render();
    }

    function partidaAcabada() {
      const pendA = estat.equips.A.preguntes.filter(p => p.estat === "pending").length;
      const pendB = estat.equips.B.preguntes.filter(p => p.estat === "pending").length;

      return estat.comencat && pendA === 0 && pendB === 0;
    }

    function fiPartida() {
      const a = estat.equips.A.encerts;
      const b = estat.equips.B.encerts;

      let missatge = "Ronda acabada. ";

      if (a > b) {
        missatge += "Guanya l’Equip A!";
      } else if (b > a) {
        missatge += "Guanya l’Equip B!";
      } else {
        missatge += "Empat!";
      }

      document.getElementById("message").textContent = missatge;
      document.getElementById("currentLetter").textContent = "FI";
      document.getElementById("hint").textContent = missatge;

      render();
    }

    function render() {
      renderEquip("A");
      renderEquip("B");
      renderRosco("A");
      renderRosco("B");
    }

    function renderEquip(id) {
      const equip = estat.equips[id];
      const pendents = equip.preguntes.filter(p => p.estat === "pending").length;

      document.getElementById("score" + id).textContent = equip.encerts;
      document.getElementById("correct" + id).textContent = equip.encerts;
      document.getElementById("wrong" + id).textContent = equip.errors;
      document.getElementById("pending" + id).textContent = pendents;
      document.getElementById("turn" + id).textContent = estat.torn === id ? "Sí" : "No";

      document.getElementById("team" + id).classList.toggle("active-team", estat.torn === id);
    }

    function renderRosco(id) {
      const container = document.getElementById("rosco" + id);
      container.innerHTML = "";

      const preguntes = estat.equips[id].preguntes;
      const total = preguntes.length;
      const center = 50;
      const radius = 43;

      preguntes.forEach((p, i) => {
        const angle = (2 * Math.PI * i / total) - Math.PI / 2;
        const x = center + radius * Math.cos(angle);
        const y = center + radius * Math.sin(angle);

        const div = document.createElement("div");

        div.className = "letter " + p.estat;

        if (
          estat.comencat &&
          estat.torn === id &&
          estat.equips[id].index === i &&
          p.estat === "pending"
        ) {
          div.classList.add("current");
        }

        div.style.left = x + "%";
        div.style.top = y + "%";
        div.textContent = p.lletra;

        container.appendChild(div);
      });
    }

    document.getElementById("answerInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        checkAnswer();
      }
    });

    startGame();
  </script>
</body>
</html>
