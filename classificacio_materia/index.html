<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classificador de Matèria</title>
    <!-- Tailwind CSS per a l'estil -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jsPDF per a generar informes -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* Estils personalitzats addicionals */
        .atom-button {
            transition: all 0.2s ease-in-out;
            cursor: pointer;
        }
        .atom-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }
        .feedback-modal-content {
            min-height: 80px; /* Evita que la interfície salti en mostrar el feedback */
        }
        .correct-modal {
            background-color: #d1fae5; /* Green-100 */
            color: #065f46; /* Green-800 */
            border-left: 5px solid #10b981; /* Green-500 */
        }
        .incorrect-modal {
            background-color: #fee2e2; /* Red-100 */
            color: #991b1b; /* Red-800 */
             border-left: 5px solid #ef4444; /* Red-500 */
        }
        .atom-sphere {
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            display: inline-block;
            border: 2px solid rgba(0,0,0,0.2);
        }
        .molecule-container, .atom-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
            padding: 8px;
            border-radius: 12px;
            background-color: rgba(255, 255, 255, 0.7);
            min-width: 80px;
        }
        .recipient-item {
             display: inline-flex;
             vertical-align: middle;
             cursor: pointer;
             transition: transform 0.2s, opacity 0.2s;
        }
        .recipient-item:hover {
             transform: scale(0.9);
             opacity: 0.7;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }
        .floating-score {
            position: absolute;
            font-weight: bold;
            font-size: 1.2rem;
            animation: floatUp 1s ease-out forwards;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-green-50 font-sans flex items-center justify-center min-h-screen">

    <div class="container mx-auto p-4 max-w-4xl bg-white rounded-2xl shadow-lg">

        <!-- CAPÇALERA -->
        <header class="flex flex-col sm:flex-row justify-between items-center p-4 border-b-2 border-gray-200">
            <h1 class="text-2xl md:text-3xl font-bold text-blue-800 mb-2 sm:mb-0">🌍 Classificador de Matèria</h1>
            <div class="flex items-center space-x-4">
                <div class="text-lg font-semibold relative">
                    Punts: <span id="score" class="bg-blue-600 text-white rounded-full px-3 py-1">0</span>
                    <div id="score-feedback-container" class="absolute top-0 right-0 h-full w-full pointer-events-none z-50"></div>
                </div>
                <button id="generate-report-btn" class="bg-indigo-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-indigo-700 transition duration-300">
                    Genera Informe
                </button>
            </div>
        </header>

        <!-- SELECCIÓ DE NIVELL -->
        <div class="p-4 flex justify-center gap-4">
            <button id="level1-btn" class="bg-teal-500 text-white font-bold py-2 px-6 rounded-lg shadow-md hover:bg-teal-600 focus:outline-none focus:ring-2 focus:ring-teal-400 focus:ring-opacity-75 transition duration-300">Nivell 1: Classificador</button>
            <button id="level2-btn" class="bg-purple-500 text-white font-bold py-2 px-6 rounded-lg shadow-md hover:bg-purple-600 focus:outline-none focus:ring-2 focus:ring-purple-400 focus:ring-opacity-75 transition duration-300">Nivell 2: Constructor</button>
        </div>
        
        <hr/>
        <div class="p-4 flex items-center justify-center gap-2">
            <label for="student-name" class="text-xl font-bold text-indigo-800">NOM:</label>
            <input type="text" id="student-name" placeholder="Escriu el teu nom..." class="flex-grow p-3 border-2 rounded-lg text-lg bg-indigo-50 border-indigo-200 focus:ring-2 focus:ring-indigo-400 focus:outline-none transition">
        </div>


        <!-- CONTINGUT PRINCIPAL -->
        <main id="main-content" class="p-4 md:p-6">

            <!-- NIVELL 1: EL CLASSIFICADOR -->
            <div id="level1-container">
                <h2 class="text-xl font-semibold text-center text-gray-700 mb-4">Nivell 1: Classifica la Substància</h2>
                <div id="l1-question-card" class="bg-gray-50 p-6 rounded-xl shadow-md text-center">
                    <p class="text-lg mb-2">Substància a classificar (<span id="question-counter"></span>):</p>
                    <h3 id="l1-substance-name" class="text-3xl font-bold text-gray-800 mb-6">--</h3>
                    
                    <!-- Pas 1 -->
                    <div id="l1-step1">
                        <p class="font-semibold mb-3">Pas 1: Es pot separar per mètodes físics?</p>
                        <div class="flex justify-center gap-4">
                            <button data-answer="mescla" class="l1-step1-btn bg-yellow-500 text-white font-bold py-3 px-6 rounded-lg w-48 hover:bg-yellow-600 transition">Sí (Mescla)</button>
                            <button data-answer="pura" class="l1-step1-btn bg-green-500 text-white font-bold py-3 px-6 rounded-lg w-48 hover:bg-green-600 transition">No (Substància pura)</button>
                        </div>
                    </div>
                    
                                        <!-- Pas 2 -->
                    <div id="l1-step2" class="hidden mt-6">
                        <p id="l1-step2-question" class="font-semibold mb-3">Pas 2: Com està formada?</p>
                        
                        <!-- Botons per substància pura -->
                        <div id="l1-step2-pure-buttons" class="flex justify-center gap-4 hidden">
                            <button data-answer="element" class="l1-step2-btn bg-blue-500 text-white font-bold py-3 px-6 rounded-lg w-40 hover:bg-blue-600 transition">Element</button>
                            <button data-answer="compost" class="l1-step2-btn bg-red-500 text-white font-bold py-3 px-6 rounded-lg w-40 hover:bg-red-600 transition">Compost</button>
                        </div>

                        <!-- Botons per mescla -->
                        <div id="l1-step2-mixture-buttons" class="flex justify-center gap-4 hidden">
                            <button data-answer="homogènia" class="l1-step2-btn bg-purple-500 text-white font-bold py-3 px-6 rounded-lg w-40 hover:bg-purple-600 transition">Homogènia</button>
                            <button data-answer="heterogènia" class="l1-step2-btn bg-orange-500 text-white font-bold py-3 px-6 rounded-lg w-40 hover:bg-orange-600 transition">Heterogènia</button>
                        </div>
                    </div>
                </div>

                <div class="flex justify-center mt-4 gap-4">
                    <button id="l1-hint-btn" class="bg-gray-500 text-white font-bold py-2 px-4 rounded-lg hover:bg-gray-600 transition"> necessito una pista (-2 punts)</button>
                </div>

            </div>

            <!-- NIVELL 2: EL CONSTRUCTOR ATÒMIC -->
            <div id="level2-container" class="hidden">
                 <h2 class="text-xl font-semibold text-center text-gray-700 mb-4">Nivell 2: Construeix la Matèria</h2>
                 <div class="bg-gray-50 p-6 rounded-xl shadow-md">
                    <p class="text-center text-lg mb-2">Objectiu:</p>
                    <h3 id="l2-goal" class="text-2xl font-bold text-gray-800 mb-6 text-center">--</h3>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Paleta de components -->
                        <div>
                            <h4 class="font-semibold mb-3 text-center">Paleta de Components</h4>
                            <div id="l2-palette" class="grid grid-cols-2 lg:grid-cols-3 gap-3 items-center justify-center p-2 bg-gray-200 rounded-lg">
                                <!-- Components visuals es generaran aquí -->
                            </div>
                        </div>
                        <!-- Recipient de construcció -->
                        <div>
                            <h4 class="font-semibold mb-3 text-center">El teu Recipient</h4>
                            <div id="l2-recipient" class="bg-white border-2 border-dashed border-gray-400 rounded-lg min-h-[150px] p-3 flex flex-wrap gap-2 items-start">
                                <!-- Components afegits apareixeran aquí -->
                            </div>
                        </div>
                    </div>

                    <div class="flex justify-center gap-4 mt-6">
                        <button id="l2-verify-btn" class="bg-green-600 text-white font-bold py-3 px-8 rounded-lg hover:bg-green-700 transition w-40">Verifica</button>
                        <button id="l2-reset-btn" class="bg-gray-400 text-white font-bold py-3 px-8 rounded-lg hover:bg-gray-500 transition">Reinicia</button>
                    </div>
                 </div>
                 
                 <div class="flex justify-center mt-4 gap-4">
                    <button id="l2-hint-btn" class="bg-gray-500 text-white font-bold py-2 px-4 rounded-lg hover:bg-gray-600 transition"> necessito una pista (-2 punts)</button>
                 </div>

            </div>

        </main>
    </div>

    <!-- Finestra Modal per a Feedback -->
    <div id="feedback-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 hidden z-50" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div id="feedback-modal-content" class="feedback-modal-content bg-white rounded-lg shadow-xl p-6 max-w-md w-full">
            <h3 id="modal-title" class="text-2xl font-bold mb-4">--</h3>
            <p id="modal-explanation" class="mb-6">--</p>
            <button id="modal-close-btn" class="bg-blue-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-blue-700 w-full focus:ring-4 focus:ring-blue-300">Tanca i continua</button>
        </div>
    </div>


    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Dades de l'aplicació
            let allLevel1Questions = [
                { substance: "Oxigen (O₂)", type1: "pura", type2: "element", hint: "Està format per un únic tipus d'àtom, encara que vagin en parelles.", explanation: "L'Oxigen és una substància pura i un element, ja que totes les seves partícules estan fetes d'àtoms d'oxigen." },
                { substance: "Aigua (H₂O)", type1: "pura", type2: "compost", hint: "Les seves molècules tenen àtoms d'Hidrogen i d'Oxigen units.", explanation: "L'aigua és una substància pura i un compost, perquè està formada per molècules idèntiques (H₂O), cadascuna amb àtoms diferents." },
                { substance: "Aigua amb sal", type1: "mescla", type2: "homogènia", hint: "Conté aigua i sal, i no es poden distingir a simple vista.", explanation: "És una mescla (d'aigua i sal) i és homogènia perquè els seus components no es distingeixen." },
                { substance: "Ferro (Fe)", type1: "pura", type2: "element", hint: "Busca'l a la taula periòdica. Està format per un sol tipus d'àtom.", explanation: "El Ferro és un element químic. Totes les partícules són àtoms de Ferro." },
                { substance: "Aire", type1: "mescla", type2: "homogènia", hint: "És una combinació de gasos com Nitrogen, Oxigen, etc.", explanation: "L'aire és una mescla de gasos (Nitrogen, Oxigen...). Com que no distingim els components, és homogènia." },
                { substance: "Diòxid de Carboni (CO₂)", type1: "pura", type2: "compost", hint: "Les seves molècules tenen àtoms de Carboni i d'Oxigen units.", explanation: "El CO₂ és un compost, format per molècules on s'uneixen un àtom de Carboni i dos d'Oxigen." },
                { substance: "Sopa de fideus", type1: "mescla", type2: "heterogènia", hint: "Pots veure clarament el brou i els fideus per separat.", explanation: "És una mescla heterogènia. Es poden distingir clarament els seus components (brou, fideus, verdures...)." },
                { substance: "Bronze", type1: "mescla", type2: "homogènia", hint: "És un aliatge, una barreja sòlida de metalls (Coure i Estany).", explanation: "El bronze és una mescla homogènia (un aliatge) de Coure i Estany." },
                { substance: "Llet", type1: "mescla", type2: "heterogènia", hint: "Encara que sembli uniforme, les gotes de greix estan suspeses en aigua. És un col·loide.", explanation: "La llet és una mescla heterogènia (un col·loide) de greix, proteïnes i aigua." },
                { substance: "Infusió", type1: "mescla", type2: "homogènia", hint: "És aigua amb substàncies dissoltes de la planta. No pots distingir els components.", explanation: "Una infusió és una mescla homogènia, ja que les substàncies de la planta s'han dissolt en l'aigua." },
                { substance: "Amoníac (NH₃)", type1: "pura", type2: "compost", hint: "Les seves molècules estan formades per àtoms de Nitrogen i Hidrogen units.", explanation: "L'amoníac és un compost químic format per molècules idèntiques (NH₃)." },
                { substance: "Heli (He)", type1: "pura", type2: "element", hint: "És un gas noble. Els seus àtoms no s'uneixen entre ells.", explanation: "L'Heli és un element. Totes les seves partícules són àtoms individuals d'Heli." },
                { substance: "Acer", type1: "mescla", type2: "homogènia", hint: "És una barreja de Ferro i Carboni. És un aliatge metàl·lic.", explanation: "L'acer és una mescla homogènia (un aliatge) principalment de Ferro i Carboni." },
                { substance: "Plata (Ag)", type1: "pura", type2: "element", hint: "És un metall preciós que trobaràs a la taula periòdica.", explanation: "La plata és un element químic. Totes les seves partícules són àtoms de Plata." },
                { substance: "Nitrogen (N₂)", type1: "pura", type2: "element", hint: "És el gas més abundant de l'aire. Les seves partícules estan formades per dos àtoms iguals.", explanation: "El Nitrogen és un element, ja que totes les seves partícules estan fetes d'àtoms de nitrogen, agrupats en molècules diatòmiques (N₂)." },
                { substance: "Lleixiu", type1: "mescla", type2: "homogènia", hint: "És aigua amb hipoclorit de sodi (NaClO) dissolt.", explanation: "El lleixiu és una mescla homogènia, una dissolució d'hipoclorit de sodi en aigua." },
                { substance: "Alcohol etílic", type1: "pura", type2: "compost", hint: "La seva fórmula química és C₂H₅OH.", explanation: "L'alcohol etílic és un compost químic, format per molècules idèntiques." },
                { substance: "Aigua oxigenada (H₂O₂)", type1: "pura", type2: "compost", hint: "La seva fórmula química ens indica que està formada per Oxigen i Hidrogen.", explanation: "L'aigua oxigenada (peròxid d'hidrogen) és un compost pur format per molècules idèntiques." },
                { substance: "Aigua gasosa (amb gas)", type1: "mescla", type2: "heterogènia", hint: "A simple vista s'hi poden veure bombolles de gas barrejades amb l'aigua.", explanation: "Com que hi veiem bombolles de gas (generalment CO₂) enmig del líquid, es considera una mescla heterogènia." },
                { substance: "Metà (CH₄)", type1: "pura", type2: "compost", hint: "És el component principal del gas natural. Llegeix la seva fórmula per veure quins àtoms el formen.", explanation: "El metà és una substància pura composta, ja que totes les seves partícules són molècules idèntiques de CH₄." },
                { substance: "Gas butà (C₄H₁₀)", type1: "pura", type2: "compost", hint: "És el gas que conté una bombona de butà. Fixa't que està format per dos elements diferents.", explanation: "El butà és un compost químic format per molècules idèntiques, cadascuna amb 4 àtoms de carboni i 10 d'hidrogen." },
                { substance: "Bateria de liti", type1: "mescla", type2: "heterogènia", hint: "A l'interior d'una bateria hi ha diferents materials sòlids, capes de metalls i substàncies químiques.", explanation: "Una bateria és una mescla heterogènia molt complexa, formada per diferents peces, metalls, polímers i electròlits." },
                { substance: "Vinagre", type1: "mescla", type2: "homogènia", hint: "És una barreja d'aigua amb un àcid que li dóna el sabor característic. Es veu un líquid uniforme.", explanation: "El vinagre és una mescla homogènia (una dissolució) formada principalment per aigua i àcid acètic." }
            ];
            
            let level1Questions = []; // Aquest array contindrà les 10 preguntes de la sessió actual

            const masterPalette = [
                { id: 'He', type: 'atom', isElement: true, displayName: "Àtom d'Heli", atoms: [{ color: 'bg-pink-400' }] },
                { id: 'Fe', type: 'atom', isElement: true, displayName: "Àtom de Ferro", atoms: [{ color: 'bg-gray-500' }] },
                { id: 'O2', type: 'molecule', isElement: true, displayName: "Molècula d'Oxigen", atoms: [{ color: 'bg-blue-500' }, { color: 'bg-blue-500' }] },
                { id: 'N2', type: 'molecule', isElement: true, displayName: "Molècula de Nitrogen", atoms: [{ color: 'bg-purple-400' }, { color: 'bg-purple-400' }] },
                { id: 'Cl2', type: 'molecule', isElement: true, displayName: "Molècula de Clor", atoms: [{ color: 'bg-green-400' }, { color: 'bg-green-400' }] },
                { id: 'O3', type: 'molecule', isElement: true, displayName: "Molècula d'Ozó", atoms: [{ color: 'bg-blue-600' }, { color: 'bg-blue-600' }, { color: 'bg-blue-600' }] },
                { id: 'H2O', type: 'molecule', isElement: false, displayName: "Molècula d'Aigua", atoms: [{ color: 'bg-gray-200' }, { color: 'bg-blue-500' }, { color: 'bg-gray-200' }] },
                { id: 'CO2', type: 'molecule', isElement: false, displayName: "Molècula de CO₂", atoms: [{ color: 'bg-gray-700' }, { color: 'bg-red-500' }, { color: 'bg-red-500' }] },
                { id: 'NaCl', type: 'molecule', isElement: false, displayName: "Unitat de Sal (NaCl)", atoms: [{ color: 'bg-green-300' }, { color: 'bg-blue-200' }] },
                { id: 'CO', type: 'molecule', isElement: false, displayName: "Molècula de CO", atoms: [{ color: 'bg-gray-700' }, { color: 'bg-red-500' }] }
            ];

            const level2Challenges = [
                {
                    goal: "Construeix una substància pura (Element monoatòmic)",
                    validation: (items) => {
                        if (items.length === 0) return false;
                        const firstItem = items[0];
                        const allSame = items.every(item => item.id === firstItem.id);
                        return allSame && firstItem.isElement && firstItem.type === 'atom';
                    },
                    hint: "Una substància pura elemental està formada per un sol tipus d'àtom. Afegeix diverses vegades la mateixa esfera que representa un àtom sol.",
                    explanation_correct: "Molt bé! Una substància pura elemental (monoatòmica) està formada per un únic tipus d'àtom, com l'Heli o el Ferro.",
                    explanation_incorrect: "Recorda, una substància pura d'un element monoatòmic ha de contenir un sol tipus d'àtom."
                },
                {
                    goal: "Construeix una substància pura (Compost)",
                    validation: (items) => {
                        if (items.length === 0) return false;
                        const firstItem = items[0];
                        const allSame = items.every(item => item.id === firstItem.id);
                        return allSame && !firstItem.isElement;
                    },
                    hint: "Una substància pura composta està formada per molècules idèntiques. Afegeix diverses vegades la mateixa agrupació d'esferes de colors.",
                    explanation_correct: "Perfecte! Una substància pura composta està formada per un sol tipus de molècula, com l'aigua (H₂O) o el CO₂.",
                    explanation_incorrect: "Per a un compost pur, totes les partícules (les molècules) han de ser idèntiques entre si."
                },
                {
                    goal: "Construeix una substància pura (Element diatòmic)",
                    validation: (items) => {
                        if (items.length === 0) return false;
                        const firstItem = items[0];
                        const allSame = items.every(item => item.id === firstItem.id);
                        return allSame && firstItem.isElement && firstItem.atoms.length === 2;
                    },
                    hint: "Alguns elements, com l'oxigen o el clor, formen molècules de dos àtoms iguals. Totes les partícules han de ser idèntiques.",
                    explanation_correct: "Excel·lent! L'oxigen, el nitrogen o el clor són elements diatòmics. Com que totes les partícules són iguals, és una substància pura.",
                    explanation_incorrect: "Per a un element diatòmic pur, totes les partícules han de ser el mateix tipus de molècula de dos àtoms iguals."
                },
                {
                    goal: "Construeix una substància pura (Element triatòmic)",
                    validation: (items) => {
                        if (items.length === 0) return false;
                        const firstItem = items[0];
                        const allSame = items.every(item => item.id === firstItem.id);
                        return allSame && firstItem.isElement && firstItem.atoms.length === 3;
                    },
                    hint: "L'Ozó (O₃) és un element format per molècules de 3 àtoms iguals. Tria l'Ozó de la paleta.",
                    explanation_correct: "Molt bé! L'Ozó és una forma elemental de l'oxigen on els àtoms s'agrupen de tres en tres.",
                    explanation_incorrect: "Has de triar una molècula que sigui un element (àtoms iguals) però triatòmica (3 àtoms)."
                },
                {
                    goal: "Construeix una mescla de dos elements diferents",
                     validation: (items) => {
                        const uniqueIds = new Set(items.map(item => item.id));
                        if (uniqueIds.size !== 2) return false;
                        const firstType = masterPalette.find(p => p.id === Array.from(uniqueIds)[0]);
                        const secondType = masterPalette.find(p => p.id === Array.from(uniqueIds)[1]);
                        return firstType.isElement && secondType.isElement;
                    },
                    hint: "Barreja dos tipus d'elements, per exemple un àtom sol (Heli) i una molècula elemental (Oxigen).",
                    explanation_correct: "Correcte! Has barrejat partícules de dos elements químics diferents.",
                    explanation_incorrect: "Això no és una mescla de dos elements. Assegura't de triar dues peces que siguin elements (un sol color d'esferes)."
                },
                {
                    goal: "Construeix una mescla d'un element i un compost",
                    validation: (items) => {
                         const uniqueIds = new Set(items.map(item => item.id));
                        if (uniqueIds.size !== 2) return false;
                        const firstType = masterPalette.find(p => p.id === Array.from(uniqueIds)[0]);
                        const secondType = masterPalette.find(p => p.id === Array.from(uniqueIds)[1]);
                        return (firstType.isElement && !secondType.isElement) || (!firstType.isElement && secondType.isElement);
                    },
                    hint: "Barreja partícules d'un element (àtoms o molècules diatòmiques) amb les partícules d'un compost.",
                    explanation_correct: "Molt bé! Has barrejat les partícules d'un element amb les d'un compost.",
                    explanation_incorrect: "Recorda, una mescla d'un element i un compost ha de contenir exactament un tipus de partícula elemental i un tipus de partícula de compost."
                },
                {
                    goal: "Construeix una mescla de TRES substàncies diferents",
                    validation: (items) => {
                        const uniqueIds = new Set(items.map(item => item.id));
                        return uniqueIds.size === 3;
                    },
                    hint: "Tria tres tipus de partícules diferents de la paleta i afegeix-les al recipient.",
                    explanation_correct: "Perfecte! Has creat una mescla amb tres components diferents.",
                    explanation_incorrect: "T'has equivocat de número. Has de posar exactament tres tipus de partícules diferents al recipient."
                },
                 {
                    goal: "Repte Especial: Construeix AIRE",
                    validation: (items) => {
                        const uniqueIds = new Set(items.map(item => item.id));
                        if (uniqueIds.size < 2) return false; 
                        
                        const hasN2 = items.some(item => item.id === 'N2');
                        const hasO2 = items.some(item => item.id === 'O2');
                        
                        return hasN2 && hasO2;
                    },
                    hint: "L'aire és una mescla principalment de dos gasos (N₂ i O₂). Tots dos són elements diatòmics.",
                    explanation_correct: "Fantàstic! Has representat l'aire, que és una mescla principalment de Nitrogen (N₂, ~78%) i Oxigen (O₂, ~21%).",
                    explanation_incorrect: "La teva construcció no representa l'aire. Recorda que està format principalment per molècules de Nitrogen (N₂) i Oxigen (O₂)."
                }
            ];

            // Estat de l'aplicació (Refactoritzat en un sol objecte)
            const state = {
                currentLevel: 1,
                score: 0,
                l1_currentQuestionIndex: 0,
                l2_currentChallengeIndex: 0,
                l2_recipientItems: [],
                reportData: [],
                advanceOnModalClose: false
            };

            // Elements del DOM
            const scoreEl = document.getElementById('score');
            const level1Container = document.getElementById('level1-container');
            const level2Container = document.getElementById('level2-container');
            const l1_substanceNameEl = document.getElementById('l1-substance-name');
            const l1_step1El = document.getElementById('l1-step1');
            const l1_step2El = document.getElementById('l1-step2');
            const l1_hintBtn = document.getElementById('l1-hint-btn');
            const l1_questionCounterEl = document.getElementById('question-counter');
            const l2_goalEl = document.getElementById('l2-goal');
            const l2_paletteEl = document.getElementById('l2-palette');
            const l2_recipientEl = document.getElementById('l2-recipient');
            const l2_verifyBtn = document.getElementById('l2-verify-btn');
            const l2_resetBtn = document.getElementById('l2-reset-btn');
            const l2_hintBtn = document.getElementById('l2-hint-btn');
            const modalEl = document.getElementById('feedback-modal');
            const modalContentEl = document.getElementById('feedback-modal-content');
            const modalTitleEl = document.getElementById('modal-title');
            const modalExplanationEl = document.getElementById('modal-explanation');
            const modalCloseBtn = document.getElementById('modal-close-btn');

            // Inicialització
            init();

            function init() {
                // Selecciona 10 preguntes aleatòries per a la sessió del Nivell 1
                level1Questions = allLevel1Questions.sort(() => Math.random() - 0.5).slice(0, 10);
                level2Challenges.sort(() => Math.random() - 0.5);

                document.getElementById('level1-btn').addEventListener('click', () => switchLevel(1));
                document.getElementById('level2-btn').addEventListener('click', () => switchLevel(2));
                
                l1_hintBtn.addEventListener('click', showLevel1Hint);
                l2_verifyBtn.addEventListener('click', verifyLevel2);
                l2_resetBtn.addEventListener('click', resetLevel2Recipient);
                l2_hintBtn.addEventListener('click', showLevel2Hint);
                document.getElementById('generate-report-btn').addEventListener('click', generateReport);
                modalCloseBtn.addEventListener('click', closeModal);
                modalEl.addEventListener('click', (e) => {
                    if (e.target === modalEl) closeModal();
                });

                // Tancar modal amb tecla ESC
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape' && !modalEl.classList.contains('hidden')) {
                        closeModal();
                    }
                });

                document.querySelectorAll('.l1-step1-btn').forEach(btn => btn.addEventListener('click', handleL1Step1));
                document.querySelectorAll('.l1-step2-btn').forEach(btn => btn.addEventListener('click', handleL1Step2));

                switchLevel(1);
            }
            
            function switchLevel(level) {
                state.currentLevel = level;
                if (level === 1) {
                    level1Container.classList.remove('hidden');
                    level2Container.classList.add('hidden');
                    document.getElementById('level1-btn').classList.add('bg-teal-700', 'ring-2');
                    document.getElementById('level2-btn').classList.remove('bg-purple-700', 'ring-2');
                    loadLevel1Question();
                } else {
                    level1Container.classList.add('hidden');
                    level2Container.classList.remove('hidden');
                    document.getElementById('level1-btn').classList.remove('bg-teal-700', 'ring-2');
                    document.getElementById('level2-btn').classList.add('bg-purple-700', 'ring-2');
                    loadLevel2Challenge();
                }
            }

            function updateScore(points) {
                state.score += points;
                scoreEl.textContent = state.score;
                
                const feedbackEl = document.createElement('span');
                feedbackEl.textContent = points > 0 ? `+${points}` : points;
                feedbackEl.className = `floating-score ${points > 0 ? 'text-green-500' : 'text-red-500'} -ml-4 -mt-6`;
                
                const container = document.getElementById('score-feedback-container');
                if (container) {
                    container.appendChild(feedbackEl);
                    setTimeout(() => {
                        if(container.contains(feedbackEl)) {
                            feedbackEl.remove();
                        }
                    }, 1000);
                }
            }

            // --- LÒGICA MODAL ---
            function showModal(title, explanation, isCorrect, shouldAdvance = true) {
                state.advanceOnModalClose = shouldAdvance;
                modalTitleEl.textContent = title;
                modalExplanationEl.textContent = explanation;
                modalContentEl.className = 'feedback-modal-content bg-white rounded-lg shadow-xl p-6 max-w-md w-full'; // Reset
                if (isCorrect === true) {
                    modalContentEl.classList.add('correct-modal');
                } else if (isCorrect === false) {
                    modalContentEl.classList.add('incorrect-modal');
                }
                modalEl.classList.remove('hidden');
            }

            function closeModal() {
                modalEl.classList.add('hidden');
                if (state.advanceOnModalClose) {
                    if (state.currentLevel === 1) {
                       nextLevel1Question();
                    }
                     if (state.currentLevel === 2) {
                        nextLevel2Challenge();
                    }
                }
            }

            // --- LÒGICA NIVELL 1 ---
            function loadLevel1Question() {

                if (state.l1_currentQuestionIndex >= level1Questions.length) {
                    l1_substanceNameEl.textContent = "Nivell 1 completat!";
                    l1_step1El.classList.add('hidden');
                    l1_step2El.classList.add('hidden');
                    l1_hintBtn.classList.add('hidden');
                    l1_questionCounterEl.textContent = `10 de 10`;
                    return;
                }
                const question = level1Questions[state.l1_currentQuestionIndex];
                l1_substanceNameEl.textContent = question.substance;
                l1_questionCounterEl.textContent = `${state.l1_currentQuestionIndex + 1} de ${level1Questions.length}`;
                resetLevel1State();
            }

            function resetLevel1State() {
                l1_step1El.classList.remove('hidden');
                l1_step2El.classList.add('hidden');
                document.getElementById('l1-step2-pure-buttons').classList.add('hidden');
                document.getElementById('l1-step2-mixture-buttons').classList.add('hidden');
                l1_hintBtn.disabled = false;
                document.querySelectorAll('.l1-step1-btn, .l1-step2-btn').forEach(btn => btn.disabled = false);
            }

            function handleL1Step1(e) {
                const userAnswer1 = e.target.dataset.answer;
                const question = level1Questions[state.l1_currentQuestionIndex];

                if (userAnswer1 === question.type1) {
                    l1_step1El.classList.add('hidden');
                    l1_step2El.classList.remove('hidden');
                    if (question.type1 === 'pura') {
                        document.getElementById('l1-step2-question').textContent = "Pas 2: Com està formada?";
                        document.getElementById('l1-step2-pure-buttons').classList.remove('hidden');
                    } else if (question.type1 === 'mescla') {
                        document.getElementById('l1-step2-question').textContent = "Pas 2: Es distingeixen els components a simple vista?";
                        document.getElementById('l1-step2-mixture-buttons').classList.remove('hidden');
                    }
                } else {
                    handleL1Result(false, userAnswer1, null);
                }
            }

            function handleL1Step2(e) {
                const userAnswer2 = e.target.dataset.answer;
                const question = level1Questions[state.l1_currentQuestionIndex];
                const firstAnswer = question.type1; // We know this is correct to reach step 2
                const isCorrect = userAnswer2 === question.type2;
                handleL1Result(isCorrect, firstAnswer, userAnswer2);
            }
            
            function handleL1Result(isCorrect, ans1, ans2) {
                 const question = level1Questions[state.l1_currentQuestionIndex];
                 document.querySelectorAll('.l1-step1-btn, .l1-step2-btn').forEach(btn => btn.disabled = true);
                 l1_hintBtn.disabled = true;
                 
                 showModal(isCorrect ? "Correcte!" : "Incorrecte.", question.explanation, isCorrect);

                 if (isCorrect) {
                     updateScore(10);
                 }
                 
                 const finalAnswer = ans2 ? `${ans1}, ${ans2}` : ans1;
                 state.reportData.push({
                     level: 1,
                     question: `Classificar: ${question.substance}`,
                     answer: finalAnswer,
                     isCorrect: isCorrect,
                     points: isCorrect ? 10 : 0
                 });
            }

            function nextLevel1Question() {
                state.l1_currentQuestionIndex++;
                loadLevel1Question();
            }
            
            function showLevel1Hint() {
                const question = level1Questions[state.l1_currentQuestionIndex];
                showModal("Pista", question.hint, null, false);
                updateScore(-2);
                l1_hintBtn.disabled = true;
                state.reportData.push({
                     level: 1,
                     question: `Pista per a: ${question.substance}`,
                     answer: `(ha demanat pista)`,
                     isCorrect: null,
                     points: -2
                 });
            }


            // --- LÒGICA NIVELL 2 ---
             function loadLevel2Challenge() {
                if (state.l2_currentChallengeIndex >= level2Challenges.length) {
                    l2_goalEl.textContent = "Nivell 2 completat!";
                    l2_paletteEl.innerHTML = "";
                    l2_recipientEl.innerHTML = "";
                    l2_verifyBtn.classList.add('hidden');
                    l2_resetBtn.classList.add('hidden');
                    l2_hintBtn.classList.add('hidden');
                    return;
                }
                const challenge = level2Challenges[state.l2_currentChallengeIndex];
                l2_goalEl.textContent = challenge.goal;
                l2_paletteEl.innerHTML = '';
                
                masterPalette.forEach(comp => {
                    const compContainer = document.createElement('button');
                    compContainer.className = 'atom-button flex flex-col items-center justify-center p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400';
                    compContainer.title = comp.displayName;
                    compContainer.ariaLabel = comp.displayName;
                    
                    const visualEl = document.createElement('div');
                    visualEl.className = comp.type === 'atom' ? 'atom-container' : 'molecule-container';

                    comp.atoms.forEach(atom => {
                        const atomSphere = document.createElement('div');
                        atomSphere.className = `atom-sphere ${atom.color}`;
                        visualEl.appendChild(atomSphere);
                    });
                    
                    const labelEl = document.createElement('span');
                    labelEl.className = 'text-xs font-bold mt-1 text-gray-700';
                    labelEl.textContent = comp.id;
                    
                    compContainer.appendChild(visualEl);
                    compContainer.appendChild(labelEl);
                    compContainer.addEventListener('click', () => addComponentToRecipient(comp));
                    l2_paletteEl.appendChild(compContainer);
                });

                resetLevel2Recipient();
                l2_verifyBtn.disabled = false;
                l2_verifyBtn.textContent = "Verifica";
                l2_resetBtn.disabled = false;
                l2_hintBtn.disabled = false;
            }

            function addComponentToRecipient(comp) {
                state.l2_recipientItems.push(comp);
                const visualClone = document.createElement('div');
                visualClone.className = 'recipient-item';
                visualClone.title = "Fes clic per esborrar";
                const container = document.createElement('div');
                container.className = comp.type === 'atom' ? 'atom-container' : 'molecule-container';
                comp.atoms.forEach(atom => {
                    const atomSphere = document.createElement('div');
                    atomSphere.className = `atom-sphere ${atom.color}`;
                    container.appendChild(atomSphere);
                });
                visualClone.appendChild(container);
                
                visualClone.addEventListener('click', () => {
                    const index = state.l2_recipientItems.indexOf(comp);
                    if (index > -1) {
                        state.l2_recipientItems.splice(index, 1);
                    }
                    visualClone.remove();
                });
                
                l2_recipientEl.appendChild(visualClone);
            }

            function resetLevel2Recipient() {
                state.l2_recipientItems = [];
                l2_recipientEl.innerHTML = '';
            }
            
            function verifyLevel2() {
                l2_verifyBtn.disabled = true;
                l2_verifyBtn.innerHTML = `<svg class="animate-spin h-5 w-5 mr-3 inline-block" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10" stroke-width="4" stroke-dasharray="20 10" stroke-linecap="round"></circle></svg> Verificant...`;
                
                setTimeout(() => {
                    const challenge = level2Challenges[state.l2_currentChallengeIndex];
                    const isCorrect = challenge.validation(state.l2_recipientItems);
                    const explanation = isCorrect ? challenge.explanation_correct : challenge.explanation_incorrect;
                    
                    showModal(isCorrect ? "Correcte!" : "Incorrecte.", explanation, isCorrect);
                    
                    if (isCorrect) {
                        updateScore(15);
                    }

                    l2_hintBtn.disabled = true;
                    state.reportData.push({
                         level: 2,
                         question: `Construir: ${challenge.goal}`,
                         answer: state.l2_recipientItems.map(item => item.displayName).join(', ') || '(buit)',
                         isCorrect: isCorrect,
                         points: isCorrect ? 15 : 0
                     });
                     
                }, 500); // Small delay to show processing state
            }

            function nextLevel2Challenge() {
                state.l2_currentChallengeIndex++;
                loadLevel2Challenge();
            }

            function showLevel2Hint() {
                 const challenge = level2Challenges[state.l2_currentChallengeIndex];
                 showModal("Pista", challenge.hint, null, false);
                 updateScore(-2);
                 l2_hintBtn.disabled = true;
                 state.reportData.push({
                     level: 2,
                     question: `Pista per a: ${challenge.goal}`,
                     answer: `(ha demanat pista)`,
                     isCorrect: null,
                     points: -2
                 });
            }

            // --- GENERACIÓ D'INFORME ---
            function generateReport() {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const studentName = document.getElementById('student-name').value || 'Anònim';
                const date = new Date().toLocaleDateString('ca-ES');
                const pageHeight = doc.internal.pageSize.height;
                const pageWidth = doc.internal.pageSize.width;
                let y = 0;

                let totalPossiblePoints = 0;
                state.reportData.forEach(item => {
                    if (item.level === 1 && item.isCorrect !== null) totalPossiblePoints += 10;
                    if (item.level === 2 && item.isCorrect !== null) totalPossiblePoints += 15;
                });
                const validScore = state.score > 0 ? state.score : 0;
                const percentage = totalPossiblePoints > 0 ? Math.round((validScore / totalPossiblePoints) * 100) : 0;
                
                doc.setFillColor(79, 70, 229);
                doc.rect(0, 0, pageWidth, 25, 'F');
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(22);
                doc.setFont(undefined, 'bold');
                doc.text("Informe de Resultats", pageWidth / 2, 16, { align: 'center' });
                doc.setFontSize(12);
                doc.setFont(undefined, 'normal');
                doc.text("Classificador de Matèria", pageWidth / 2, 22, { align: 'center' });
                y = 40;

                doc.setTextColor(0, 0, 0);
                doc.setFontSize(14);
                doc.setFont(undefined, 'bold');
                doc.text("Resum de l'Activitat", 14, y);
                y += 5;
                doc.setDrawColor(200, 200, 200);
                doc.setLineWidth(0.5);
                doc.rect(14, y, pageWidth - 28, 25);
                doc.setFont(undefined, 'normal');
                doc.setFontSize(12);
                doc.text(`Alumne/a: ${studentName}`, 20, y + 8);
                doc.text(`Data: ${date}`, 20, y + 15);
                doc.setFont(undefined, 'bold');
                doc.text(`Puntuació Final: ${state.score} (${percentage}% d'encerts)`, pageWidth - 20, y + 15, { align: 'right' });
                y += 35;
                
                doc.setFontSize(14);
                doc.setFont(undefined, 'bold');
                doc.text("Detall de Respostes", 14, y);
                y += 8;
                doc.setFillColor(243, 244, 246);
                doc.rect(14, y, pageWidth - 28, 10, 'F');
                doc.setTextColor(0, 0, 0);
                doc.setFontSize(10);
                doc.setFont(undefined, 'bold');
                doc.text("Nivell", 18, y + 7);
                doc.text("Pregunta / Repte", 40, y + 7);
                doc.text("Resultat", 150, y + 7);
                doc.text("Punts", 185, y + 7);
                y += 10;

                state.reportData.forEach((item) => {
                    if (y > pageHeight - 30) {
                        doc.addPage();
                        y = 20;
                    }
                    
                    const questionText = doc.splitTextToSize(item.question, 95);
                    const rowHeight = (questionText.length * 5) + 5;

                    doc.setDrawColor(229, 231, 235);
                    doc.line(14, y + rowHeight, pageWidth - 14, y + rowHeight);
                    
                    doc.setFont(undefined, 'normal');
                    doc.setTextColor(107, 114, 128);
                    doc.text(`${item.level}`, 20, y + 7);
                    
                    doc.setTextColor(0, 0, 0);
                    doc.text(questionText, 40, y + 7);
                    
                    doc.setFont(undefined, 'bold');
                    if (item.isCorrect === true) {
                        doc.setTextColor(22, 163, 74);
                        doc.text("Correcte", 150, y + 7);
                    } else if (item.isCorrect === false) {
                        doc.setTextColor(220, 38, 38);
                        doc.text("Incorrecte", 150, y + 7);
                    } else {
                        doc.setTextColor(96, 165, 250);
                        doc.text("Pista", 150, y + 7);
                    }
                    
                    doc.setTextColor(0, 0, 0);
                    doc.text(item.points.toString(), 188, y + 7);

                    y += rowHeight;
                });

                doc.setDrawColor(200, 200, 200);
                doc.line(14, pageHeight-15, pageWidth-14, pageHeight-15);
                doc.setFontSize(8);
                doc.setTextColor(150);
                doc.text("Informe generat per l'aplicació Classificador de Matèria.", pageWidth/2, pageHeight-10, {align: 'center'});

                doc.save(`informe_quimica_${studentName.replace(/\s/g, '_')}.pdf`);
            }

        });
    </script>
</body>
</html>
